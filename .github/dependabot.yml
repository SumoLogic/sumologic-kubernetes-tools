version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Warsaw"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Warsaw"

  - package-ecosystem: "gomod"
    directory: "src/go"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Warsaw"

  - package-ecosystem: "cargo"
    directory: "src/rust/sumologic-mock"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Warsaw"

  - package-ecosystem: "cargo"
    directory: "src/rust/logs-generator"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Warsaw"
